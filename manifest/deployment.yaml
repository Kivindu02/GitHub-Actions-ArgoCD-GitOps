apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
      - name: node-app
        image: kivindu744/my-app:66cf389739aa12eb8a50123ca1113f70fcf0e478
        ports:
        - containerPort: 3000
