apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
      - name: node-app
        image: kivindu744/my-app:51eae4a2ec8b98c871d561ddbccd255ec747267d
        ports:
        - containerPort: 3000
